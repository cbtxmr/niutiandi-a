<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Niutiandi 导航 | 高效实用</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
      scroll-behavior: smooth;
    }

    body {
      background: linear-gradient(180deg, #f5f7fa 0%, #e4eaf5 100%);
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-nav {
      background: linear-gradient(90deg, #2c3e50 0%, #34495e 100%);
      color: white;
      padding: 15px 20px;
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
      letter-spacing: 1px;
    }

    .top-nav i {
      margin-right: 10px;
      color: #38bdf8;
    }

    .search-container {
      margin: 50px auto 40px;
      width: 90%;
      max-width: 700px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 18px 25px 18px 60px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.08);
      outline: none;
      transition: all 0.3s ease;
      background: white;
    }

    .search-input:focus {
      box-shadow: 0 8px 30px rgba(56,189,248,0.2), 0 0 0 3px rgba(56,189,248,0.1);
      transform: translateY(-2px);
    }

    .search-icon {
      position: absolute;
      left: 25px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 20px;
    }

    .category-title {
      width: 90%;
      max-width: 1000px;
      margin: 0 auto 20px;
      padding-left: 15px;
      font-size: 20px;
      font-weight: 600;
      color: #2c3e50;
      position: relative;
    }

    .category-title::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -8px;
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #38bdf8, #2980b9);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .category-title:hover::after {
      width: 80px;
    }

    .category-title i {
      margin-right: 10px;
      color: #38bdf8;
    }

    .nav-container {
      width: 90%;
      max-width: 1000px;
      margin: 0 auto 40px;
      flex: 1;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .nav-card {
      background: white;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 3px 15px rgba(0,0,0,0.05);
      transition: all 0.4s ease;
      text-decoration: none;
      color: #222;
      border: 2px solid transparent;
      background-clip: padding-box;
      position: relative;
      overflow: hidden;
    }

    .nav-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 18px;
      padding: 2px;
      background: linear-gradient(90deg, #38bdf8, #2980b9);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .nav-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(56,189,248,0.15);
    }

    .nav-card:hover::before {
      opacity: 1;
    }

    .nav-card i {
      font-size: 32px;
      color: #38bdf8;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }

    .nav-card:hover i {
      transform: scale(1.2);
      color: #2980b9;
    }

    .nav-card h3 {
      margin-bottom: 10px;
      color: #2c3e50;
      font-size: 18px;
    }

    .nav-card p {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    footer {
      background: linear-gradient(90deg, #2c3e50 0%, #34495e 100%);
      color: rgba(255,255,255,0.9);
      text-align: center;
      padding: 30px 20px;
      font-size: 15px;
      box-shadow: 0 -2px 15px the rgba(0,0,0,0.1);
      margin-top: auto;
    }

    footer a {
      color: #38bdf8;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: #81cff5;
      text-decoration: underline;
    }

    .footer-contact {
      margin-bottom: 10px;
    }

    .footer-copyright {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    .back-to-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #38bdf8;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      text-decoration: none;
      box-shadow: 0 3px 15px rgba(56,189,248,0.3);
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      z-index: 998;
    }

    .back-to-top.show {
      opacity: 1;
      visibility: visible;
    }

    .back-to-top:hover {
      background: #2980b9;
      transform: scale(1.1);
    }

    @media (max-width: 768px) {
      .top-nav {
        font-size: 16px;
      }
      .search-container {
        margin: 30px auto 20px;
      }
      .search-input {
        padding: 15px 20px 15px 50px;
        font-size: 15px;
      }
      .nav-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 15px;
      }
      .nav-card {
        padding: 20px 15px;
      }
      .nav-card i {
        font-size: 28px;
        margin-bottom: 10px;
      }
      .nav-card h3 {
        font-size: 16px;
      }
      .back-to-top {
        width: 45px;
        height: 45px;
        font-size: 18px;
        bottom: 20px;
        right: 20px;
      }
    }
  </style>
</head>

<body>

<div class="top-nav">
  <i class="fas fa-compass"></i>Niutiandi 专属导航
</div>

<div class="search-container">
  <i class="fas fa-search search-icon"></i>
  <input type="text" class="search-input" placeholder="输入关键词/网址，回车搜索..." id="searchInput">
</div>

<div class="nav-container">
  <h2 class="category-title"><i class="fas fa-cloud"></i>资源站点</h2>
  <div class="nav-grid">
    <a href="https://jianhancloud.cn/jingling/daohang.html" class="nav-card" target="_blank">

      <h3>精灵资源库</h3>
      <p>软件/资源/工具合集</p>
    </a>
    <a href="http://889399.xyz/" class="nav-card" target="_blank">
      <i class="fas fa-download"></i>
      <h3>墨晨资源库</h3>
      <p>破解软件/实用工具</p>
    </a>
    <a href="https://91acg.ffy.mom" class="nav-card" target="_blank">
      <i class="fas fa-book"></i>
      <h3>91ACG资源</h3>
      <p>ACG专属资源站点</p>
    </a>
  </div>
</div>

<div class="nav-container">
  <h2 class="category-title"><i class="fas fa-gamepad"></i>ACG/趣味</h2>
  <div class="nav-grid">
    <a href="https://itch.io/games/tag-adult?page=1" class="nav-card" target="_blank">
      <i class="fas fa-gamepad"></i>
      <h3>Itch.io成人游戏</h3>
      <p>海外成人游戏合集</p>
    </a>
    <a href="http://bdacg.i20.icu/xm.php" class="nav-card" target="_blank">
      <i class="fas fa-film"></i>
      <h3>BDACG资源站</h3>
      <p>ACG相关资源</p>
    </a>
    <a href="http://bdpan.9i0.fun/" class="nav-card" target="_blank">
      <i class="fas fa-cloud-download"></i>
      <h3>BD盘资源</h3>
      <p>网盘资源分享</p>
    </a>
  </div>
</div>

<a href="#" class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></a>

<footer>
  <div class="footer-contact">
    联系我：<a href="mailto:3132094259@qq.com">3132094259@qq.com</a>
  </div>
  <div class="footer-copyright">
    © 2026 Niutiandi Navigation | 所有链接仅作导航，内容归原站所有
  </div>
</footer>

<script>
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && this.value.trim() !== '') {
      const val = this.value.trim();
      if (val.includes('http://') || val.includes('https://') || val.includes('www.')) {
        window.open(val, '_blank');
      } else {
        window.open('https://www.baidu.com/s?wd=' + encodeURIComponent(val), '_blank');
      }
      this.value = '';
    }
  });

  const backToTop = document.getElementById('backToTop');
  window.addEventListener('scroll', function() {
    if (window.scrollY > 300) {
      backToTop.classList.add('show');
    } else {
      backToTop.classList.remove('show');
    }
  });

  backToTop.addEventListener('click', function(e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  window.addEventListener('load', function() {
    const cards = document.querySelectorAll('.nav-card');
    cards.forEach((card, i) => {
      card.style.opacity = 0;
      setTimeout(() => {
        card.style.opacity = 1;
      }, i * 100);
    });
  });
</script>

</body>
</html>
